<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Advisory — Dashboard</title>
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Header -->
    <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
        <h1 class="font-bold text-gray-800">Apex Advisory — Reviews</h1>
        <a href="index.html"
            class="text-sm text-gray-500 border border-gray-200 px-3 py-1 rounded-lg hover:bg-gray-50">
            ← Customer form
        </a>
    </div>

    <div class="max-w-2xl mx-auto px-4 py-8">

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-8">

            <div class="bg-white rounded-xl shadow p-4 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Avg rating</p>
                <p class="text-2xl font-bold text-orange-500">4.7 ★</p>
            </div>

            <div class="bg-white rounded-xl shadow p-4 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Reviews</p>
                <p class="text-2xl font-bold text-gray-800">3</p>
            </div>

            <div class="bg-white rounded-xl shadow p-4 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Positive</p>
                <p class="text-2xl font-bold text-green-500">94%</p>
            </div>

        </div>

        <!-- Reviews -->
        <h2 class="font-bold text-gray-700 mb-4">All Reviews</h2>

        <div class="flex flex-col gap-4">

            <!-- Review 1 -->
            <div class="bg-white rounded-xl shadow p-4 flex gap-4">
                <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-500 font-bold flex items-center justify-center text-sm flex-shrink-0">
                    JD
                </div>
                <div>
                    <p class="font-semibold text-gray-800 text-sm">Jane Doe</p>
                    <p class="text-yellow-400 text-sm">★★★★☆</p>
                    <p class="text-gray-500 text-sm mt-1">Really helpful team, fast response times!</p>
                </div>
            </div>

            <!-- Review 2 -->
            <div class="bg-white rounded-xl shadow p-4 flex gap-4">
                <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-500 font-bold flex items-center justify-center text-sm flex-shrink-0">
                    MK
                </div>
                <div>
                    <p class="font-semibold text-gray-800 text-sm">Mark K.</p>
                    <p class="text-yellow-400 text-sm">★★★★★</p>
                    <p class="text-gray-500 text-sm mt-1">Best consultants I've worked with!</p>
                </div>
            </div>

            <!-- Review 3 -->
            <div class="bg-white rounded-xl shadow p-4 flex gap-4">
                <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-500 font-bold flex items-center justify-center text-sm flex-shrink-0">
                    AS
                </div>
                <div>
                    <p class="font-semibold text-gray-800 text-sm">Amara S.</p>
                    <p class="text-yellow-400 text-sm">★★★★★</p>
                    <p class="text-gray-500 text-sm mt-1">Exceptional service from start to finish.</p>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
