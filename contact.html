<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Advisory — Contact</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Nav -->
    <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
        <h1 class="font-bold text-gray-800">Apex Advisory</h1>
        <div class="flex gap-4">
            <a href="index.html" class="text-sm text-gray-500 hover:text-gray-800">Home</a>-
            <a href="about.html" class="text-sm text-gray-500 hover:text-gray-800">About</a>
            <a href="contact.html" class="text-sm text-orange-500 font-semibold">Contact</a>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold text-gray-800 mb-4">Contact Us</h2>
        <p class="text-gray-500 text-sm mb-6">Get in touch with the Apex Advisory team.</p>

        <div class="bg-white rounded-2xl shadow p-6 flex flex-col gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Your Name</label>
                <input type="text" placeholder="Jane Doe"
                    class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <input type="email" placeholder="jane@example.com"
                    class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Message</label>
                <textarea placeholder="How can we help?"
                    class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500 h-28 resize-none"></textarea>
            </div>
            <button class="bg-gray-900 text-white py-2 rounded-lg text-sm font-semibold hover:bg-gray-700">
                Send message
            </button>
        </div>
    </div>
    <!-- Footer -->
    <div class="bg-gray-900 px-6 py-8 text-center">
        <p class="text-gray-500 text-sm">2026 Apex Advisory. All rights reserved.</p>
        <div class="flex gap-6 justify-center mt-3">
            <a href="index.html" class="text-gray-500 text-sm hover:text-white">Home</a>
            <a href="about.html" class="text-gray-500 text-sm hover:text-white">About</a>
            <a href="home.html" class="text-gray-500 text-sm hover:text-white">Feedback</a>
            <a href="contact.html" class="text-gray-500 text-sm hover:text-white">Contact</a>
        </div>
    </div>

</body>
</html>
